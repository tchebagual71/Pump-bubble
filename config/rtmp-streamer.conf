# 24/7 RTMP Streamer Configuration
# Copy this file to /etc/rtmp-streamer/config and modify values

# Display configuration
DISPLAY_NUM=99
SCREEN_RESOLUTION=1920x1080x24

# Application URL to stream
APP_URL=http://localhost:3000

# RTMP destination URL (replace with your actual stream key)
RTMP_URL=rtmp://live.twitch.tv/live/YOUR_STREAM_KEY

# Logging
LOG_FILE=/var/log/rtmp-streamer/stream.log

# Chrome configuration
CHROME_USER_DATA_DIR=/tmp/chrome-streaming

# FFmpeg streaming settings
VIDEO_BITRATE=3000k
AUDIO_BITRATE=128k
FRAMERATE=30